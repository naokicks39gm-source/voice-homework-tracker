<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>提出状況</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <h2>提出状況</h2>
  <p id="message">読み込み中...</p>

  <table id="table">
    <tr>
      <th>学年</th>
      <th>組</th>
      <th>出席番号</th>
      <th>提出率</th>
      <th>提出済み</th>
      <th>未提出</th>
    </tr>
  </table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { doc, getDoc, getFirestore } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

console.log("START");

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "voice-homework-checker.firebaseapp.com",
  projectId: "voice-homework-checker",
  storageBucket: "voice-homework-checker.firebasestorage.app",
  messagingSenderId: "641056865813",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const table = document.getElementById("table");
const message = document.getElementById("message");

if (!table || !message) {
  throw new Error("DOM not found");
}

const params = new URLSearchParams(location.search);

const year = params.get("year") || new Date().getFullYear().toString();
const grade = params.get("grade");
const classNum = params.get("class");

if (!grade || !classNum) {
  message.textContent = "grade / class が不足";
  throw new Error("missing params");
}

const docId = `${year}_${grade}_${classNum}`;

console.log("DOC_ID:", docId);

try {
  const snap = await getDoc(doc(db, "studentShares", docId));

  if (!snap.exists()) {
    message.textContent = "データなし";
    throw new Error("no data");
  }

  const data = snap.data();
  const students = data.students;

  message.textContent = "";

  Object.entries(students)
    .sort((a, b) => Number(a[0]) - Number(b[0]))
    .forEach(([id, info]) => {
      table.insertAdjacentHTML("beforeend", `
        <tr>
          <td>${data.grade}</td>
          <td>${data.classNum}</td>
          <td>${id}</td>
          <td>${info.rate}</td>
          <td>${info.submitted}</td>
          <td>${info.missing}</td>
        </tr>
      `);
    });

  console.log("DONE");

} catch (e) {
  console.error(e);
  message.textContent = "読み込み失敗";
}
</script>

</body>
</html>
